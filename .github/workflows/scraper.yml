name: Pinterest Image Scraper

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-image-scraper]

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load Pinterest session
        run: |
          echo "${{ secrets.PINTEREST_SESSION }}" | base64 -d > pinterest_session.json
          echo "Session file size:"
          wc -c pinterest_session.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xvfb ffmpeg fonts-freefont-ttf
          pip install playwright requests pillow
          playwright install --with-deps chromium

      - name: Run scraper
        run: |
          xvfb-run -a python scraper.py "${{ github.event.client_payload.image_url }}"

      # ✅ Save IMAGE (safe)
      - name: Save image to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          mkdir -p pinterest_images

          FILE=$(ls images 2>/dev/null | head -n 1)

          if [ -n "$FILE" ]; then
            echo "Found image: $FILE"

            rm -f pinterest_images/*
            cp "images/$FILE" pinterest_images/latest.jpg

            git add pinterest_images/
            git commit -m "Update pinterest image" || echo "No changes"
            git push
          else
            echo "No image found — skipping"
          fi

      # ✅ NEW: Save VIDEO (safe)
      - name: Save video to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p videos

          if [ -f output.mp4 ]; then
            echo "Video found"

            rm -f videos/*
            cp output.mp4 videos/output.mp4

            git add videos/output.mp4
            git commit -m "Update video" || echo "No changes"
            git push
          else
            echo "No video found — skipping"
          fi

      # ✅ Debug artifacts (optional but useful)
      - name: Save debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            query.png
            shop_now_btn.png
            output.mp4
            images/

      - name: Debug
        if: always()
        run: |
          echo "Workflow finished"
          ls -la images/ || echo "No images folder"
          ls -la pinterest_images/ || echo "No pinterest_images folder"
          ls -la videos/ || echo "No videos folder"
