name: Pinterest Image Scraper
on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-image-scraper]
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load Pinterest session
        run: |
          echo "${{ secrets.PINTEREST_SESSION }}" | base64 -d > pinterest_session.json
          echo "Session file size:"
          wc -c pinterest_session.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip xvfb
          pip install playwright requests Pillow
          playwright install --with-deps chromium

      - name: Run scraper
        run: |
          xvfb-run -a python scraper.py "${{ github.event.client_payload.image_url }}"

      - name: Save images to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          mkdir -p pinterest_images
          rm -f pinterest_images/*
          cp images/img_0.jpg pinterest_images/latest.jpg 2>/dev/null || \
          cp images/img_0.png pinterest_images/latest.png 2>/dev/null || \
          echo "No image to copy"
          git add pinterest_images/
          git commit -m "Update pinterest image" || echo "No changes"
          git push

      - name: Save debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            query.png
            step1_home.png
            step2_search_clicked.png
            step3_lens_clicked.png
            step4_after_upload.png
            step5_results.png
            step6_after_scroll.png
            images/

      - name: Debug
        if: always()
        run: |
          echo "Workflow finished"
          ls -la pinterest_images/ || echo "No images folder found"
