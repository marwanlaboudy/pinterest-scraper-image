name: Pinterest Image Scraper

on:
  repository_dispatch:
    types: [run-scraper]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load Pinterest session
        run: |
          echo "${{ secrets.PINTEREST_SESSION }}" | base64 -d > pinterest_session.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip xvfb fonts-dejavu-core fonts-freefont-ttf
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run scraper
        run: |
          xvfb-run python scraper.py
